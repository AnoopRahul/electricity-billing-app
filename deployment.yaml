apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-app-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-app

  template:
    metadata:
      labels:
        app: billing-app

    spec:
      containers:
      - name: billing-container
        image: 23mis0333/billing-app:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: billing-service

spec:
  selector:
    app: billing-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

  type: NodePort